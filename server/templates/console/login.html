{{define "title"}}Login — Salio Console{{end}}

{{define "content"}}
<div class="login-page">
    <div class="login-center">

        <div class="login-logo-wrap">
            <div class="login-logo-box">
                <img src="/static/logo.png" alt="Salio">
            </div>
            <h1 class="login-title">Salio Console</h1>
            <p class="login-subtitle">Platform administration</p>
        </div>

        <div class="login-card">

            {{if .Error}}
            <div class="alert-error">
                <svg fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                </svg>
                <span>{{.Error}}</span>
            </div>
            {{end}}

            <form method="POST" action="/console/login" class="space-y-5">
                <div>
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                           class="form-input" placeholder="admin@salio.co.ke" value="{{.Email}}">
                </div>
                <div>
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                           class="form-input" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">Sign in to Console</button>
            </form>
        </div>

        <p class="login-footer">Salio Platform &copy; {{.Year}} &nbsp;&middot;&nbsp; Internal use only</p>
    </div>
</div>
{{end}}
